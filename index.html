<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Money Workspace</title>
    <meta name="description" content="Standalone Smart Money trading workspace: dashboard, checklists, journal, playbook, risk, statistics, psychology." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      if (window.tailwind) {
        tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
            colors: { zinc: { 950: '#09090b' } }
          }
        }
      };
      }
    </script>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: #050507; color: #e4e4e7; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .no-cdn .tw-note { display: block; }
      .tw-note { display: none; }
      .bg-grid { background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.07) 1px, transparent 0); background-size: 28px 28px; }
      .panel { background: rgba(24,24,27,.72); border: 1px solid rgba(63,63,70,.8); border-radius: 14px; box-shadow: 0 18px 60px rgba(0,0,0,.25); }
      .glass { background: rgba(9,9,11,.78); backdrop-filter: blur(16px); border: 1px solid rgba(63,63,70,.75); }
      .tab.active { background: #10b981; color: #04130e; border-color: #34d399; }
      input, select, textarea { width: 100%; background: rgba(9,9,11,.82); border: 1px solid #3f3f46; color: #f4f4f5; border-radius: 10px; padding: .68rem .8rem; outline: none; }
      input:focus, select:focus, textarea:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,.14); }
      textarea { min-height: 90px; resize: vertical; }
      button { cursor: pointer; }
      .btn { display: inline-flex; align-items: center; justify-content: center; gap: .45rem; border-radius: 10px; border: 1px solid #3f3f46; background: #18181b; color: #f4f4f5; padding: .62rem .85rem; font-weight: 700; font-size: .86rem; transition: .15s ease; }
      .btn:hover { background: #27272a; border-color: #52525b; }
      .btn-primary { background: #10b981; color: #04130e; border-color: #34d399; }
      .btn-primary:hover { background: #34d399; }
      .btn-danger { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.4); color: #fecaca; }
      .chip { border: 1px solid #3f3f46; background: rgba(39,39,42,.72); border-radius: 999px; padding: .28rem .55rem; font-size: .72rem; color: #d4d4d8; }
      .progress { height: 8px; background: #27272a; border-radius: 999px; overflow: hidden; }
      .progress > span { display: block; height: 100%; background: linear-gradient(90deg,#10b981,#22d3ee); }
      .table-wrap { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; min-width: 760px; }
      th, td { text-align: left; padding: .72rem; border-bottom: 1px solid rgba(63,63,70,.65); font-size: .86rem; }
      th { color: #a1a1aa; font-weight: 700; background: rgba(39,39,42,.5); }
      .fallback-flex { display:flex; }
      @media (max-width: 900px) { .layout { grid-template-columns: 1fr !important; } aside { position: static !important; height: auto !important; } }
    </style>
  </head>
  <body class="bg-zinc-950 text-zinc-100">
    <noscript>
      <main style="max-width:720px;margin:4rem auto;padding:2rem;background:#18181b;border:1px solid #3f3f46;border-radius:16px">
        <h1>JavaScript is required</h1>
        <p>This standalone app uses vanilla JavaScript for tabs, persistence, calculators, and journal editing.</p>
      </main>
    </noscript>
    <div id="app" class="min-h-screen"></div>
    <script>
      // If Tailwind CDN is blocked, the custom CSS above still keeps the app readable.
      window.addEventListener('load', function () {
        var probe = document.createElement('div');
        probe.className = 'hidden';
        document.body.appendChild(probe);
        if (getComputedStyle(probe).display !== 'none') document.body.classList.add('no-cdn');
        probe.remove();
      });
    </script>
    <script src="app.js"></script>
  </body>
</html>
