# Default values for finberg-service. Each service overrides via its
# environment-specific values file (e.g. values.prod.yaml).

nameOverride: ""
fullnameOverride: ""

image:
  repository: ""
  tag: latest
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: ecr-pull-secret

replicaCount: 3

service:
  type: ClusterIP
  port: 80
  targetPort: 4000
  metricsPort: 4000

ingress:
  enabled: false
  className: alb
  annotations: {}
  hosts: []

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

serviceAccount:
  create: true
  annotations: {}    # IRSA: { eks.amazonaws.com/role-arn: arn:aws:iam::... }

env: []              # [{ name: KEY, value: VAL }] or { name, valueFrom: ... }
envFromSecret: ""    # name of an existing Secret to envFrom

probes:
  liveness:
    httpGet:
      path: /healthz
      port: 4000
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    httpGet:
      path: /readyz
      port: 4000
    initialDelaySeconds: 5
    periodSeconds: 5

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

nodeSelector: {}
tolerations: []
affinity: {}

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /metrics
