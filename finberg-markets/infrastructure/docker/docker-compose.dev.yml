# ============================================================================
# FINBERG MARKETS — Local Development Stack
# Brings up all data + streaming infrastructure for the monorepo.
# Run: pnpm dev:infra
# ============================================================================

name: finberg-dev

services:
  # --------------------------------------------------------------------------
  # PostgreSQL — OLTP (users, billing, layouts)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: finberg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finberg
      POSTGRES_PASSWORD: finberg
      POSTGRES_DB: finberg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finberg"]
      interval: 5s
      timeout: 3s
      retries: 20

  # --------------------------------------------------------------------------
  # TimescaleDB — OHLCV time series
  # --------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:2.16.1-pg16
    container_name: finberg-timescale
    restart: unless-stopped
    environment:
      POSTGRES_USER: finberg
      POSTGRES_PASSWORD: finberg
      POSTGRES_DB: finberg_ts
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ../../database/schemas/market_data.sql:/docker-entrypoint-initdb.d/01-market.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finberg"]
      interval: 5s
      timeout: 3s
      retries: 20

  # --------------------------------------------------------------------------
  # Redis — cache + session + rate-limit
  # --------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: finberg-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --------------------------------------------------------------------------
  # ClickHouse — analytics / scanner / audit
  # --------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: finberg-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # Kafka (KRaft mode) — tick fan-out, durable streams
  # --------------------------------------------------------------------------
  kafka:
    image: bitnami/kafka:3.8
    container_name: finberg-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/bitnami/kafka

  # --------------------------------------------------------------------------
  # NATS JetStream — work queues, alert routing
  # --------------------------------------------------------------------------
  nats:
    image: nats:2.10-alpine
    container_name: finberg-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data

  # --------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (chart snapshots, exports)
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: finberg-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Keycloak — identity broker
  # --------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: finberg-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/finberg
      KC_DB_USERNAME: finberg
      KC_DB_PASSWORD: finberg
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # Observability — Prometheus + Grafana + Loki + Tempo
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: finberg-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.2.0
    container_name: finberg-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    ports:
      - "3030:3000"
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  timescale_data:
  redis_data:
  clickhouse_data:
  kafka_data:
  nats_data:
  minio_data:
  prometheus_data:
  grafana_data:
