global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["host.docker.internal:4000"]
    metrics_path: /metrics

  - job_name: market-data
    static_configs:
      - targets: ["host.docker.internal:4010"]
    metrics_path: /metrics

  - job_name: auth
    static_configs:
      - targets: ["host.docker.internal:4020"]
    metrics_path: /metrics

  - job_name: alerts
    static_configs:
      - targets: ["host.docker.internal:4030"]
    metrics_path: /metrics

  - job_name: ai-engine
    static_configs:
      - targets: ["host.docker.internal:4040"]
    metrics_path: /metrics
